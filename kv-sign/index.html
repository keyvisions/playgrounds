<body>
    <h1>kv-sign - Signature Component</h1>
    <form id="signatureForm" action="/submit" method="post" enctype="multipart/form-data">
        <label for="userName">Name:</label>
        <input type="text" id="userName" name="userName" required><br><br>
        <label>Signature:</label><br>
        <kv-sign name="signature" width="400" height="150"></kv-sign><br><br>
        <button type="submit">Submit Form</button>
    </form>
    <div id="formOutput"></div>
