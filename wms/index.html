<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>WMS</title>

	<script defer src="./wms-structure.js"></script>
	<script defer src="./wms-map.js"></script>
	<script defer src="./wms-loading-units.js"></script>
	<script defer src="./wms.js"></script>

	<link rel="stylesheet" href="./wms.css" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
		integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
		crossorigin="anonymous" referrerpolicy="no-referrer" />

	<style>
		:root {
			font-family: Arial, Helvetica, sans-serif;
			--special-backcolor: lightgreen;
			--special-color: black;
		}
	</style>

	<script>
		let _URL;
		fetch(".data")
			.then(res => res.text())
			.then(res => { 
				_URL = res.match(/^URL=(.*)$/m)[1]
			})
			.catch(err => console.log("No .data file"));
		
		function putaway(event) {
			console.clear();
			document.querySelectorAll("wms-loading-units input[type=hidden]").forEach(el => {
				console.log(el.value);
			});
			return false;
		}
		function printLULabels(data) {
			alert("Print: " + JSON.stringify(data));
			return true;
		}
		function printSULabels(data) {
			let url = `${_URL}filldocx.asp?type=labels&layout=${data.layout}&set=${data.prefix}&count=${data.count}&rows=${data.grid.split("x")[0]}&cols=${data.grid.split("x")[1]}&offset=${data.offset}&destfile=Labels${data.prefix}.docx`;
			window.location = url;
			return false;
		}
		function highlightMap(event) {
			const prefix = event.target.closest("tr")?.querySelector(".unit-prefix")?.innerText;
			if (prefix) {
				event.target.closest("table").querySelector("tr.selected")?.classList.remove("selected");
				event.target.closest("tr").classList.add("selected");
				const svg = document.querySelector("wms-map").SVGDocument;
				if (svg) {
					svg.querySelectorAll(".selected").forEach(el => el.classList.remove("selected"));
					svg.querySelectorAll(`[id*=${prefix}]`).forEach(el => el.classList.add("selected"));
				}
			}
		}
		async function verifyCode(code) {
			try {
				const response = await fetch(`${_URL}?*r=5514&code=${encodeURIComponent(code)}`, {
					headers: { 'Accept': 'application/json' }
				});
				const data = await response.json();
				return !!data.exists;
			} catch (_err) {
				return false;
			}
		}
		async function placeLU(data) {
			try {
				const response = await fetch(`${_URL}?*r=5517&data=${encodeURIComponent(JSON.stringify(data))}`);
				await response.text();
				return true;
			} catch (_err) {
				return false;
			}
		}
	</script>
</head>

<body>
	<wms-place oncheck="verifyCode" onsubmit="placeLU()"></wms-place>

	<div style="display: flex; gap: 1rem;">
		<input type="hidden" id="structure" name="fData" value="./data/wms-structure.json">
		<wms-structure refinput="structure" onclick="highlightMap(event)" onprint="printSULabels(data)"></wms-structure>
		<wms-map style="flex: 1 1 0; min-width:0;" mode="putting" map="./media/warehouse.svg"
			inventory="./data/wms-inventory.json" locations="./data/wms-locations.json">
		</wms-map>
	</div>

	<div>
		<form class="wms">
			<table>
				<thead>	
					<tr>
						<th>Codice</th>
						<th>Quantità</th>
					</tr>
				</thead>
				<tbody>
					<tr>
						<td>ABC</td>
						<td><wms-loading-units name="qty" itemid="ABC" onprint="printLULabels()">100</wms-loading-units></td>
					</tr>
					<tr>
						<td>DEF</td>
						<td><wms-loading-units name="qty" itemid="DEF" onprint="printLULabels()">200</wms-loading-units></td>
					</tr>
					<tr>
						<td>GHI</td>
						<td><wms-loading-units name="qty" itemid="GHI"></wms-loading-units></td>
					</tr>
				</tbody>
			</table>
			<button onclick="return putaway(event)">Status</button>
		</form>
	</div>
</body>

</html>
