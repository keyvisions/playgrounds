<!DOCTYPE html>
<html lang="it">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>WMS</title>

	<script defer src="./wms-map.js"></script>
	<script defer src="./wms-structure.js"></script>
	<script defer src="./wms-loading-units.js"></script>
	<script defer src="./wms.js"></script>

	<link rel="stylesheet" href="./wms.css" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
		integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
		crossorigin="anonymous" referrerpolicy="no-referrer" />

	<style>
		:root {
			color-scheme: dark light;
			font-family: Arial, Helvetica, sans-serif;
			--special-backcolor: lightgreen;
			--special-color: black;
		}
	</style>

	<script>
		let _URL;
		document.addEventListener("DOMContentLoaded", () => {
			fetch(".data")
				.then(res => res.text())
				.then(res => {
					_URL = res.match(/^URL=(.*)$/m)[1];
					const planimetry = document.querySelector("wms-map");
					if (planimetry) {
						planimetry.setAttribute("inventory", _URL + "?*r=5515");
					}
				})
				.catch(err => console.log("No .data file"));
		});

		function put(event) {
			console.clear();
			const input = document.getElementById("qty");
			if (input) {
				console.log(input.value);
			}
			return false;
		}
		function printLabelsSU(d) {
			let url = `${_URL}filldocx.asp?type=LabelsSU${d.prefix.length === 1 ? 'H' + parseInt(d.grid) : 'V'}&prefix=${d.prefix}&offset=${d.offset}&count=${d.count}&lpr=${parseInt(d.grid)}`;
			window.location = url;
			return false;
		}
		async function manageLU(d, r) {
			const params = new URLSearchParams();
			params.append("row", r);
			params.append("data", JSON.stringify(d));

			console.log(d, r);

			const res = await fetch(`${_URL}?*r=5509`, {
				method: "POST",
				headers: {
					"Content-Type": "application/x-www-form-urlencoded"
				},
				body: params.toString()
			});
			try { return res.json(); } catch (_err) { return d; }
		}
		async function verifyCode(code) {
			try {
				const response = await fetch(`${_URL}?*r=5514&code=${encodeURIComponent(code.toUpperCase())}`, {
					headers: { 'Accept': 'application/json' }
				});
				return await response.json();
			} catch (_err) {
				return { exists: 0 };
			}
		}
		async function putLU(data) {
			try {
				const response = await fetch(`${_URL}?*r=5517&data=${encodeURIComponent(JSON.stringify(data))}`);
				await response.text();
				return true;
			} catch (_err) {
				return false;
			}
		}
		async function pickLU(data) { }
	</script>
</head>

<body>
	<div style="display: flex; gap: 1rem; justify-content: space-evenly;">
		<div>
			<table>
				<thead>
					<tr>
						<th>Codice</th>
						<th>Quantità</th>
					</tr>
				</thead>
				<tbody>
					<tr>
						<td>ABC</td>
						<td><wms-loading-units for="qty" refid="123" itemid="ABC" onaction="manageLU()"></wms-loading-units>
						</td>
					</tr>
					<tr>
						<td>DEF</td>
						<td><wms-loading-units for="qty" refid="456" itemid="DEF"
								onaction="manageLU()">200</wms-loading-units>
						</td>
					</tr>
					<tr>
						<td>GHI</td>
						<td><wms-loading-units for="qty" refid="789" itemid="GHI"></wms-loading-units></td>
					</tr>
				</tbody>
			</table>
			<input id="qty" name="qty"
				value='{"123":{"refid":"123","itemid":"ABC","quantity":100,"lu":[{"units":1,"quantity":102,"batch":"2026+","origin":"ITA","coded":true}],"status":1,"totalLU":1},"456":{"refid":"456","itemid":"DEF","quantity":200,"lu":[{"units":1,"quantity":200,"batch":"","origin":"","coded":false}],"status":0}}'>
			<button onclick="return put(event)">Status</button>
		</div>
		<!--wms-put oncheck="verifyCode()" onsubmit="putLU()" refmap="planimetry"></wms-put-->
		<!--wms-pick oncheck="verifyCode()" onsubmit="pickLU()" refmap="planimetry"></wms-pick-->
	</div>

	<!--div style="display: flex; gap: 1rem;">
		<wms-structure onprint="printLabelsSU(data)" refmap="planimetry">./data/wms-structure.json</wms-structure>
		<wms-map id="planimetry" name="fMap" style="flex: 1 1 0; min-width:0;">./media/warehouse.svg</wms-map>
	</div-->
</body>

</html>
